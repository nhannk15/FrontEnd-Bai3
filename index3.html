<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>index3</title>
</head>
<body>
    <form action="https://www.w3schools.com/action_page.php" target="_blank" method="POST" autocomplete="on">
        <label for="fullname">Full Name: </label>
        <input id="fullname" type="text" name="ho_ten" placeholder="Full Name" required><br>

        <label for="password">Password: </label>
        <input id="password" type="password" name="password" placeholder="Password" required><br>

        <label for="color">Color: </label>
        <select name="color" size="1" multiple>
            <option value="Yellow">Yellow</option>
            <option value="Red">Red</option>
            <option value="Black">Black</option>
            <option values="Blue" selected>Blue</option>
            <option value="Pink">Pink</option>
            <option value="Orange">Orange</option>
            <option value="White">White</option>
        </select><br>

        <label for="date">Start Date: </label>
        <input type="date" name="startDate" id="startDate" required><br>

        <label for="date">End Date: </label>
        <input type="date" name="endDate" id="endDate" required><br>
        
        <label for="notes">Notes: </label>
        <textarea id="notes" name="textarea" rows="5" cols="40"></textarea><br>

        <input type="submit" value="Send">
    </form>
    <button>Sending</button><br>
    <form action="https://www.w3schools.com/action_page.php" target="_blank">
        <p>All the studied programming language</p>

        <input type="checkbox" id="C_language" name="programmingLanguage" value="C">
        <label for="C_language">C Programming Language</label>

        <input type="checkbox" id="Java_language" name="programmingLanguage" value="Java">
        <label for="Java_language">Java Programming Language</label>

        <input type="checkbox" id="Python_language" name="programmingLanguage" value="Python">
        <label for="Python_language">Python Programming Language</label>

        <input type="submit" value="Send">
    </form><br>

    <form action="https://www.w3schools.com/action_page.php" target="_blank">
        <p>Select your most favourite language</p>

        <input type="radio" id="C_language1" name="programmingLanguage" value="C">
        <label for="C_language1">C Programming Language</label><br>

        <input type="radio" id="Java_language1" name="programmingLanguage" value="Java">
        <label for="Java_language1">Java Programming Language</label><br>

        <input type="radio" id="Python_language1" name="programmingLanguage" value="Python">
        <label for="Python_language1">Python Programming Language</label><br>


        <input type="submit" value="Send">
    </form><br>

    <form action="https://www.w3schools.com/action_page.php" target="_blank">
        <input type="range" name="volume" id="volumn" min="100" max="1000" step="200">
        <input type="submit" value="Send">
    </form>
</body>
</html>
